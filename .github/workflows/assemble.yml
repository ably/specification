name: Assemble

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: ably/github-event-context-action@7f2c0aa105a3ee8c531919bdbe98f27c2d261bfe # v1.1.1
        id: context

      - name: Read Node.js version
        id: tool-versions
        run: echo "nodejs=$(grep nodejs .tool-versions | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: peaceiris/actions-hugo@6b1ee2dcc06c9b6629a5317fa0146473914d05e1 # v3
        with:
          hugo-version: 'latest'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ steps.tool-versions.outputs.nodejs }}

      - run: npm ci
        working-directory: build

      - name: Build
        run: npm run build
        working-directory: build
        env:
          HUGO_PARAMS_BUILDCONTEXTSHA: ${{ steps.context.outputs.sha }}
          HUGO_PARAMS_BUILDCONTEXTURL: ${{ steps.context.outputs.url }}
          HUGO_PARAMS_BUILDCONTEXTTITLE: ${{ steps.context.outputs.title }}

      - if: ${{ github.actor != 'dependabot[bot]' }}
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ secrets.ABLY_AWS_ACCOUNT_ID_SDK }}:role/ably-sdk-builds-specification
          role-session-name: "${{ github.run_id }}-${{ github.run_number }}"

      - if: ${{ github.actor != 'dependabot[bot]' }}
        uses: ably/sdk-upload-action@4e694297f208b72b5a9f6b1248a1556f19f821d6 # v2.2.0
        with:
          sourcePath: build/public
          githubToken: ${{ secrets.GITHUB_TOKEN }}
