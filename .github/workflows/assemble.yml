name: Assemble

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ably/github-event-context-action@v1
        id: context

      - name: Read Node.js version
        id: tool-versions
        run: echo "nodejs=$(grep nodejs .tool-versions | awk '{print $2}')" >> $GITHUB_OUTPUT

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.tool-versions.outputs.nodejs }}

      - run: npm ci
        working-directory: build

      - name: Build
        run: npm run build
        working-directory: build
        env:
          HUGO_PARAMS_BUILDCONTEXTSHA: ${{ steps.context.outputs.sha }}
          HUGO_PARAMS_BUILDCONTEXTURL: ${{ steps.context.outputs.url }}
          HUGO_PARAMS_BUILDCONTEXTTITLE: ${{ steps.context.outputs.title }}

      - if: ${{ github.actor != 'dependabot[bot]' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::${{ secrets.ABLY_AWS_ACCOUNT_ID_SDK }}:role/ably-sdk-builds-specification
          role-session-name: "${{ github.run_id }}-${{ github.run_number }}"

      - if: ${{ github.actor != 'dependabot[bot]' }}
        uses: ably/sdk-upload-action@v2
        with:
          sourcePath: build/public
          githubToken: ${{ secrets.GITHUB_TOKEN }}
